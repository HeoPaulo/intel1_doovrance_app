<!DOCTYPE html>
<html lang="ko">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @page {
      size: A4;
      margin: 8mm;
    }

    body {
      font-family: -apple-system, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .page {
      width: 210mm;
      height: 297mm;
      background: #fff;
      padding: 8mm;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 3mm;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
    }

    .cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 0.4mm solid #bbb;
      border-radius: 1.5mm;
      padding: 2mm 1.5mm 1.5mm;
      gap: 1mm;
      overflow: hidden;
    }

    .cell img {
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      display: block;
      image-rendering: pixelated;
    }

    .label {
      font-size: 5.5pt;
      color: #444;
      text-align: center;
      letter-spacing: -0.2px;
      line-height: 1.2;
      white-space: nowrap;
    }

    .label strong {
      display: block;
      font-size: 6pt;
      color: #111;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }
      .page {
        box-shadow: none;
        width: 100%;
        height: 100%;
      }
    }
  </style>
